<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stocks Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero swiss-grid-pattern">
        <p class="section-label">01. SYSTEM</p>
        <h1>Screening Explorer</h1>
        <p>
          Exploração de estratégias de ações com comparação por interseção, análise de risco e contexto
          editorial.
        </p>
        <div class="hero-meta">
          <span id="status">Inicializando...</span>
          <span>Gerado em: <strong id="generated-at">-</strong></span>
        </div>
      </section>

      <section>
        <p class="section-label">02. ESTRATÉGIAS</p>
        <div id="strategies" class="strategy-grid"></div>
      </section>
    </main>

    <aside id="compare-drawer" class="drawer" aria-label="Comparação">
      <header class="drawer-head">
        <h2>Comparar estratégias</h2>
        <button id="close-compare" class="btn">Fechar</button>
      </header>
      <div class="drawer-body">
        <div class="control">
          <label for="mode-select">Operação:</label>
          <select id="mode-select">
            <option value="AND">AND (interseção)</option>
            <option value="OR">OR (união)</option>
          </select>
        </div>
        <div id="compare-strategy-list"></div>
        <p id="compare-count" class="muted"></p>
        <div id="compare-results"></div>
      </div>
    </aside>

    <aside id="detail-drawer" class="drawer" aria-label="Risco do ativo">
      <header class="drawer-head">
        <h2>Risco do ativo</h2>
        <button id="close-detail" class="btn">Fechar</button>
      </header>
      <div id="detail-content" class="drawer-body"></div>
    </aside>

    <script type="module" src="./main.mjs"></script>
  </body>
</html>
